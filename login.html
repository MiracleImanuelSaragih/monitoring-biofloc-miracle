<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Login — BIOFLOC MONIORING POLTEK</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#00c2a8"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="config.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#070b10; --card:#0e151c; --border:#1c2a35; --input-bg:#131d26;
  --accent:#00c2a8; --text:#eef3f6; --text-dim:#5f7587; --green:#22c55e; --red:#ef4444;
}
body{
  font-family:'Barlow',sans-serif; background:var(--bg); color:var(--text);
  min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:20px; overflow:hidden; position:relative;
}
/* Water ripple background effect */
body::before{
  content:''; position:fixed; inset:0;
  background:
    radial-gradient(ellipse 70% 45% at 50% -5%, rgba(0,194,168,.16) 0%, transparent 65%),
    radial-gradient(ellipse 50% 35% at 90% 105%, rgba(59,158,255,.08) 0%, transparent 60%);
  pointer-events:none;
}
.wave-decor{position:fixed;bottom:0;left:0;right:0;height:160px;opacity:.18;pointer-events:none;z-index:0;}
.logo-area{text-align:center;margin-bottom:30px;animation:slideDown .5s ease-out;position:relative;z-index:1;}
.logo-icon{font-size:48px;line-height:1;margin-bottom:8px;filter:drop-shadow(0 0 18px rgba(0,194,168,.55));}
.logo-title{font-family:'Barlow Condensed',sans-serif;font-size:27px;font-weight:900;letter-spacing:2.5px;}
.logo-title span{color:var(--accent);}
.logo-sub{font-size:10.5px;color:var(--text-dim);letter-spacing:1.2px;margin-top:5px;line-height:1.5;}

.login-card{
  background:var(--card); border:1px solid var(--border); border-radius:20px;
  padding:26px 22px; width:100%; max-width:380px; animation:slideUp .5s ease-out;
  position:relative; z-index:1;
}
.tab-row{display:flex;background:var(--input-bg);border-radius:10px;padding:3px;margin-bottom:22px;}
.tab-btn{flex:1;background:none;border:none;padding:9px;border-radius:8px;color:var(--text-dim);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;}
.tab-btn.active{background:var(--accent);color:#04231f;}
.form-group{margin-bottom:13px;}
.form-label{display:block;font-size:11px;font-weight:600;letter-spacing:1px;color:var(--text-dim);margin-bottom:5px;text-transform:uppercase;}
.form-input{width:100%;padding:12px 15px;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Barlow',sans-serif;font-size:15px;transition:all .2s;}
.form-input:focus{outline:none;border-color:var(--accent);background:rgba(0,194,168,.04);box-shadow:0 0 0 3px rgba(0,194,168,.1);}
.pw-wrap{position:relative;}
.pw-toggle{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:17px;}
.btn-submit{width:100%;background:var(--accent);color:#04231f;border:none;padding:14px;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:1.3px;cursor:pointer;transition:all .2s;margin-top:5px;}
.btn-submit:hover{filter:brightness(1.08);transform:translateY(-1px);}
.btn-submit:disabled{background:#2d2d3f;color:var(--text-dim);cursor:not-allowed;transform:none;}
.status-msg{margin-top:13px;padding:10px 13px;border-radius:8px;font-size:13px;text-align:center;display:none;}
.status-msg.error{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);display:block;}
.status-msg.success{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.3);display:block;}
.spinner{width:18px;height:18px;border:2px solid rgba(4,35,31,.3);border-top-color:#04231f;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:7px;}
.register-note{font-size:11px;color:var(--text-dim);text-align:center;margin-top:14px;line-height:1.6;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<svg class="wave-decor" viewBox="0 0 1440 200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M0,100 C240,160 480,40 720,100 C960,160 1200,40 1440,100 L1440,200 L0,200 Z" fill="#00c2a8"/>
</svg>

<div class="logo-area">
  <div class="logo-icon">🐟</div>
  <h1 class="logo-title">BIOFLOC <span>MONITORING</span></h1>
  <p class="logo-sub">REAL-TIME WATER QUALITY MONITORING <br>BIOFLOK NILA; </p>
</div>

<div class="login-card">
  <div class="tab-row">
    <button class="tab-btn active" id="tabLogin" onclick="switchMode('login')">MASUK</button>
    <button class="tab-btn" id="tabRegister" onclick="switchMode('register')">DAFTAR</button>
  </div>

  <div class="form-group">
    <label class="form-label">Username</label>
    <input class="form-input" type="text" id="usernameInput" placeholder="Masukkan username" autocomplete="username" onkeydown="if(event.key==='Enter')focusPw()">
  </div>
  <div class="form-group">
    <label class="form-label">Password</label>
    <div class="pw-wrap">
      <input class="form-input" type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')handleAuth()">
      <button class="pw-toggle" onclick="togglePw('passwordInput','pwToggle1')" id="pwToggle1">👁</button>
    </div>
  </div>
  <div class="form-group" id="confirmGroup" style="display:none;">
    <label class="form-label">Konfirmasi Password</label>
    <div class="pw-wrap">
      <input class="form-input" type="password" id="confirmInput" placeholder="••••••••" autocomplete="new-password" onkeydown="if(event.key==='Enter')handleAuth()">
    </div>
  </div>

  <button class="btn-submit" id="submitBtn" onclick="handleAuth()">MASUK</button>
  <div class="status-msg" id="statusMsg"></div>
  <p class="register-note" id="loginNote">Belum punya akun? Klik tab <b>DAFTAR</b>.</p>
  <p class="register-note" id="registerNote" style="display:none;">Buat akun untuk mengakses dashboard monitoring kolam.</p>
</div>

<script>
const { FIREBASE_CONFIG } = window.AQUA_CONFIG;
if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();

auth.onAuthStateChanged(user => { if (user) window.location.replace('./index.html'); });

let currentMode = 'login';
function switchMode(mode) {
  currentMode = mode;
  document.getElementById('tabLogin').classList.toggle('active', mode === 'login');
  document.getElementById('tabRegister').classList.toggle('active', mode === 'register');
  document.getElementById('confirmGroup').style.display = mode === 'register' ? 'block' : 'none';
  document.getElementById('submitBtn').textContent = mode === 'login' ? 'MASUK' : 'BUAT AKUN';
  document.getElementById('loginNote').style.display = mode === 'login' ? 'block' : 'none';
  document.getElementById('registerNote').style.display = mode === 'register' ? 'block' : 'none';
  clearStatus();
}
function focusPw() { document.getElementById('passwordInput').focus(); }
function togglePw(id, btnId) {
  const inp = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  document.getElementById(btnId).textContent = show ? '🙈' : '👁';
}
function setStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg; el.className = 'status-msg ' + type;
}
function clearStatus() { document.getElementById('statusMsg').className = 'status-msg'; }
function setLoading(yes) {
  const btn = document.getElementById('submitBtn');
  btn.disabled = yes;
  btn.innerHTML = yes ? '<span class="spinner"></span>Memproses...' : (currentMode==='login' ? 'MASUK' : 'BUAT AKUN');
}
function usernameToEmail(u) { return u.toLowerCase().trim().replace(/\s+/g,'_') + '@aquasentinel.app'; }

function handleAuth() {
  const username = document.getElementById('usernameInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  const confirm  = document.getElementById('confirmInput').value;
  if (!username) return setStatus('⚠️ Username wajib diisi.', 'error');
  if (username.length < 3) return setStatus('⚠️ Username minimal 3 karakter.', 'error');
  if (!password) return setStatus('⚠️ Password wajib diisi.', 'error');
  if (password.length < 6) return setStatus('⚠️ Password minimal 6 karakter.', 'error');
  if (currentMode === 'register') {
    if (!confirm) return setStatus('⚠️ Konfirmasi password wajib diisi.', 'error');
    if (password !== confirm) return setStatus('⚠️ Password tidak cocok.', 'error');
    doRegister(username, password);
  } else { doLogin(username, password); }
}
function doLogin(username, password) {
  setLoading(true); clearStatus();
  auth.signInWithEmailAndPassword(usernameToEmail(username), password)
    .then(() => { setStatus('✅ Berhasil masuk!', 'success'); setTimeout(()=>window.location.replace('./index.html'),700); })
    .catch(err => {
      setLoading(false);
      const msg = err.code==='auth/user-not-found' ? '❌ Username tidak ditemukan. Coba DAFTAR.'
                : err.code==='auth/wrong-password' ? '❌ Password salah.'
                : err.code==='auth/network-request-failed' ? '📵 Tidak ada koneksi internet.'
                : '❌ ' + err.message;
      setStatus(msg, 'error');
    });
}
function doRegister(username, password) {
  setLoading(true); clearStatus();
  auth.createUserWithEmailAndPassword(usernameToEmail(username), password)
    .then(c => c.user.updateProfile({ displayName: username }))
    .then(() => { setStatus('✅ Akun dibuat!', 'success'); setTimeout(()=>window.location.replace('./index.html'),700); })
    .catch(err => {
      setLoading(false);
      const msg = err.code==='auth/email-already-in-use' ? '❌ Username sudah dipakai.'
                : err.code==='auth/network-request-failed' ? '📵 Tidak ada koneksi internet.'
                : '❌ ' + err.message;
      setStatus(msg, 'error');
    });
}
</script>
</body>
</html>
