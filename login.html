<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Login — DAILY OVERCOMER</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#ff6b00"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0a0a0f; --card:#13131c; --border:#1f1f2e; --input-bg:#1a1a27;
      --accent:#ff6b00; --text:#f0f0f5; --text-dim:#6b7280; --green:#22c55e; --red:#ef4444;
    }
    body {
      font-family:'Barlow',sans-serif; background:var(--bg); color:var(--text);
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center; padding:20px; overflow:hidden;
    }
    body::before {
      content:''; position:fixed; inset:0;
      background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(255,107,0,0.12) 0%, transparent 70%);
      pointer-events:none;
    }
    /* Lang toggle */
    .lang-toggle {
      position:fixed; top:16px; right:16px;
      display:flex; background:var(--card); border:1px solid var(--border);
      border-radius:20px; padding:3px; gap:2px; z-index:10;
    }
    .lang-btn {
      background:none; border:none; color:var(--text-dim);
      font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700;
      padding:5px 12px; border-radius:16px; cursor:pointer; transition:all 0.2s; letter-spacing:0.5px;
    }
    .lang-btn.active { background:var(--accent); color:white; }

    .logo-area { text-align:center; margin-bottom:32px; animation:slideDown 0.5s ease-out; }
    .logo-icon { font-size:50px; line-height:1; margin-bottom:10px; filter:drop-shadow(0 0 20px rgba(255,107,0,0.5)); }
    .logo-title { font-family:'Barlow Condensed',sans-serif; font-size:30px; font-weight:900; letter-spacing:3px; }
    .logo-title span { color:var(--accent); }
    .logo-sub { font-size:11px; color:var(--text-dim); letter-spacing:1.5px; margin-top:4px; }

    .login-card {
      background:var(--card); border:1px solid var(--border); border-radius:20px;
      padding:26px 22px; width:100%; max-width:380px;
      animation:slideUp 0.5s ease-out; position:relative; z-index:1;
    }
    .tab-row {
      display:flex; background:var(--input-bg); border-radius:10px; padding:3px; margin-bottom:22px;
    }
    .tab-btn {
      flex:1; background:none; border:none; padding:9px;
      border-radius:8px; color:var(--text-dim);
      font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700;
      letter-spacing:1px; cursor:pointer; transition:all 0.2s;
    }
    .tab-btn.active { background:var(--accent); color:white; }
    .form-group { margin-bottom:13px; }
    .form-label { display:block; font-size:11px; font-weight:600; letter-spacing:1px; color:var(--text-dim); margin-bottom:5px; text-transform:uppercase; }
    .form-input {
      width:100%; padding:12px 15px; background:var(--input-bg); border:1px solid var(--border);
      border-radius:10px; color:var(--text); font-family:'Barlow',sans-serif; font-size:15px; transition:all 0.2s;
    }
    .form-input:focus { outline:none; border-color:var(--accent); background:rgba(255,107,0,0.04); box-shadow:0 0 0 3px rgba(255,107,0,0.1); }
    .form-input::placeholder { color:var(--text-dim); }
    .pw-wrap { position:relative; }
    .pw-toggle { position:absolute; right:13px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:17px; padding:0; }
    .btn-submit {
      width:100%; background:var(--accent); color:white; border:none; padding:14px;
      border-radius:10px; font-family:'Barlow Condensed',sans-serif; font-size:17px; font-weight:800;
      letter-spacing:1.5px; cursor:pointer; transition:all 0.2s; margin-top:5px;
    }
    .btn-submit:hover { background:#e05a00; transform:translateY(-1px); }
    .btn-submit:disabled { background:#2d2d3f; color:var(--text-dim); cursor:not-allowed; transform:none; }
    .status-msg { margin-top:13px; padding:10px 13px; border-radius:8px; font-size:13px; text-align:center; display:none; }
    .status-msg.error   { background:rgba(239,68,68,0.15); color:var(--red); border:1px solid rgba(239,68,68,0.3); display:block; }
    .status-msg.success { background:rgba(34,197,94,0.12); color:var(--green); border:1px solid rgba(34,197,94,0.3); display:block; }
    .spinner { width:18px; height:18px; border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; vertical-align:middle; margin-right:7px; }
    .register-note { font-size:11px; color:var(--text-dim); text-align:center; margin-top:14px; line-height:1.6; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes slideDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideUp   { from { opacity:0; transform:translateY(16px);  } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>

<!-- Language Toggle -->
<div class="lang-toggle">
  <button class="lang-btn active" id="btnID" onclick="setLang('id')">ID</button>
  <button class="lang-btn" id="btnEN" onclick="setLang('en')">EN</button>
</div>

<div class="logo-area">
  <div class="logo-icon">
    <img src="logo.png" alt="Logo" style="width: 55px; height: 55px; object-fit: contain;">
  </div>
  <h1 class="logo-title">DAILY <span>OVERCOMER</span></h1>
  <p class="logo-sub" id="logoSub">Created By @miracleimanuel_</p>
</div>

<div class="login-card">
  <div class="tab-row">
    <button class="tab-btn active" id="tabLogin" onclick="switchMode('login')" data-id="MASUK" data-en="LOGIN">MASUK</button>
    <button class="tab-btn" id="tabRegister" onclick="switchMode('register')" data-id="DAFTAR" data-en="REGISTER">DAFTAR</button>
  </div>

  <div class="form-group">
    <label class="form-label" id="lblUsername">Username</label>
    <input class="form-input" type="text" id="usernameInput" placeholder="username" autocomplete="username" onkeydown="if(event.key==='Enter')focusPw()">
  </div>
  <div class="form-group">
    <label class="form-label" id="lblPassword">Password</label>
    <div class="pw-wrap">
      <input class="form-input" type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')handleAuth()">
      <button class="pw-toggle" onclick="togglePw('passwordInput','pwToggle1')" id="pwToggle1">👁</button>
    </div>
  </div>
  <div class="form-group" id="confirmGroup" style="display:none;">
    <label class="form-label" id="lblConfirm">Konfirmasi Password</label>
    <div class="pw-wrap">
      <input class="form-input" type="password" id="confirmInput" placeholder="••••••••" autocomplete="new-password" onkeydown="if(event.key==='Enter')handleAuth()">
      <button class="pw-toggle" onclick="togglePw('confirmInput','pwToggle2')" id="pwToggle2">👁</button>
    </div>
  </div>

  <button class="btn-submit" id="submitBtn" onclick="handleAuth()">MASUK</button>
  <div class="status-msg" id="statusMsg"></div>
  <p class="register-note" id="loginNote"></p>
  <p class="register-note" id="registerNote" style="display:none;"></p>
</div>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyAcnTpDBXO2WpXs3ri21SXJfzUMC_xkCkU",
  authDomain:"premium-todo-list.firebaseapp.com",
  projectId:"premium-todo-list",
  storageBucket:"premium-todo-list.appspot.com",
  messagingSenderId:"630693485104",
  appId:"1:630693485104:web:820a99e6af935a7345abf5"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

auth.onAuthStateChanged(user => { if (user) window.location.replace('./index.html'); });

// ── Language ─────────────────────────────────────────────────
const STRINGS = {
  id: {
    sub:'PERSONAL FITNESS TRACKER',
    lblUser:'Username', lblPass:'Password', lblConfirm:'Konfirmasi Password',
    phUser:'Masukkan username kamu', phPass:'Masukkan password', phConfirm:'Ulangi password',
    btnLogin:'MASUK', btnRegister:'BUAT AKUN',
    noteLogin:'Belum punya akun? Klik tab <b>DAFTAR</b> untuk buat akun baru. Bagikan username & password ke teman.',
    noteReg:'Buat akun sekali, lalu bagikan ke teman yang ingin ikut akses.',
    errUser:'⚠️ Username wajib diisi.', errUser3:'⚠️ Username minimal 3 karakter.',
    errPass:'⚠️ Password wajib diisi.', errPass6:'⚠️ Password minimal 6 karakter.',
    errConfirm:'⚠️ Konfirmasi password wajib diisi.', errMatch:'⚠️ Password tidak cocok.',
    loading:'Memproses...', success:'✅ Berhasil! Mengalihkan...',
    errNotFound:'❌ Username tidak ditemukan. Coba tab DAFTAR.', errWrong:'❌ Password salah.',
    errNetwork:'📵 Tidak ada koneksi internet.', errUsed:'❌ Username sudah dipakai.',
  },
  en: {
    sub:'PERSONAL FITNESS TRACKER',
    lblUser:'Username', lblPass:'Password', lblConfirm:'Confirm Password',
    phUser:'Enter your username', phPass:'Enter your password', phConfirm:'Re-enter password',
    btnLogin:'LOGIN', btnRegister:'CREATE ACCOUNT',
    noteLogin:'No account yet? Click <b>REGISTER</b> to create one. Share your username & password with friends.',
    noteReg:'Create an account once, then share access with friends.',
    errUser:'⚠️ Username is required.', errUser3:'⚠️ Username must be at least 3 characters.',
    errPass:'⚠️ Password is required.', errPass6:'⚠️ Password must be at least 6 characters.',
    errConfirm:'⚠️ Please confirm your password.', errMatch:'⚠️ Passwords do not match.',
    loading:'Processing...', success:'✅ Success! Redirecting...',
    errNotFound:'❌ Username not found. Try the REGISTER tab.', errWrong:'❌ Wrong password.',
    errNetwork:'📵 No internet connection.', errUsed:'❌ Username already taken.',
  }
};
let lang = localStorage.getItem('sdf_lang') || 'id';

function setLang(l) {
  lang = l;
  localStorage.setItem('sdf_lang', l);
  document.getElementById('btnID').classList.toggle('active', l==='id');
  document.getElementById('btnEN').classList.toggle('active', l==='en');
  applyLang();
}
function applyLang() {
  const s = STRINGS[lang];
  document.getElementById('logoSub').textContent = s.sub;
  document.getElementById('lblUsername').textContent = s.lblUser;
  document.getElementById('lblPassword').textContent = s.lblPass;
  document.getElementById('lblConfirm').textContent = s.lblConfirm;
  document.getElementById('usernameInput').placeholder = s.phUser;
  document.getElementById('passwordInput').placeholder = s.phPass;
  document.getElementById('confirmInput').placeholder = s.phConfirm;
  document.getElementById('loginNote').innerHTML = s.noteLogin;
  document.getElementById('registerNote').innerHTML = s.noteReg;
  const isLogin = currentMode === 'login';
  document.getElementById('submitBtn').textContent = isLogin ? s.btnLogin : s.btnRegister;
  document.getElementById('tabLogin').textContent = lang==='id' ? 'MASUK' : 'LOGIN';
  document.getElementById('tabRegister').textContent = lang==='id' ? 'DAFTAR' : 'REGISTER';
}
setLang(lang);

// ── Mode ──────────────────────────────────────────────────────
let currentMode = 'login';
function switchMode(mode) {
  currentMode = mode;
  document.getElementById('tabLogin').classList.toggle('active', mode==='login');
  document.getElementById('tabRegister').classList.toggle('active', mode==='register');
  document.getElementById('confirmGroup').style.display = mode==='register' ? 'block' : 'none';
  document.getElementById('loginNote').style.display = mode==='login' ? 'block' : 'none';
  document.getElementById('registerNote').style.display = mode==='register' ? 'block' : 'none';
  applyLang(); clearStatus();
}
function focusPw() { document.getElementById('passwordInput').focus(); }
function togglePw(inputId, btnId) {
  const inp = document.getElementById(inputId);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  document.getElementById(btnId).textContent = show ? '🙈' : '👁';
}

function setStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.innerHTML = msg; el.className = 'status-msg ' + type;
}
function clearStatus() { document.getElementById('statusMsg').className = 'status-msg'; }
function setLoading(yes) {
  const btn = document.getElementById('submitBtn');
  const s = STRINGS[lang];
  btn.disabled = yes;
  btn.innerHTML = yes
    ? `<span class="spinner"></span>${s.loading}`
    : (currentMode==='login' ? s.btnLogin : s.btnRegister);
}
function usernameToEmail(u) { return u.toLowerCase().trim().replace(/\s+/g,'_') + '@strongdailyflow.app'; }

function handleAuth() {
  const s = STRINGS[lang];
  const username = document.getElementById('usernameInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  const confirm  = document.getElementById('confirmInput').value;
  if (!username) return setStatus(s.errUser, 'error');
  if (username.length < 3) return setStatus(s.errUser3, 'error');
  if (!password) return setStatus(s.errPass, 'error');
  if (password.length < 6) return setStatus(s.errPass6, 'error');
  if (currentMode === 'register') {
    if (!confirm) return setStatus(s.errConfirm, 'error');
    if (password !== confirm) return setStatus(s.errMatch, 'error');
    doRegister(username, password);
  } else { doLogin(username, password); }
}

function doLogin(username, password) {
  setLoading(true); clearStatus();
  auth.signInWithEmailAndPassword(usernameToEmail(username), password)
    .then(() => { setStatus(STRINGS[lang].success, 'success'); setTimeout(() => window.location.replace('./index.html'), 700); })
    .catch(err => {
      setLoading(false);
      const s = STRINGS[lang];
      const msg = err.code==='auth/user-not-found' ? s.errNotFound
                : err.code==='auth/wrong-password' ? s.errWrong
                : err.code==='auth/network-request-failed' ? s.errNetwork
                : '❌ ' + err.message;
      setStatus(msg, 'error');
    });
}
function doRegister(username, password) {
  setLoading(true); clearStatus();
  auth.createUserWithEmailAndPassword(usernameToEmail(username), password)
    .then(c => c.user.updateProfile({ displayName: username }))
    .then(() => { setStatus(STRINGS[lang].success, 'success'); setTimeout(() => window.location.replace('./index.html'), 700); })
    .catch(err => {
      setLoading(false);
      const s = STRINGS[lang];
      const msg = err.code==='auth/email-already-in-use' ? s.errUsed
                : err.code==='auth/network-request-failed' ? s.errNetwork
                : '❌ ' + err.message;
      setStatus(msg, 'error');
    });
}
</script>
</body>
</html>
