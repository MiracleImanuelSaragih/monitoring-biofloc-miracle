<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List - Noel</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 20px;
      margin: 0;
    }
    .container {
      max-width: 800px;
      margin: auto;
    }
    h2 {
      margin-bottom: 10px;
      text-align: center;
      font-size: 28px;
    }
    .card {
      background: white;
      color: black;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }
    .input-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr auto;
      gap: 10px;
      margin-bottom: 15px;
    }
    .input-row-schedule {
      display: grid;
      grid-template-columns: 3fr 2fr auto;
      gap: 10px;
      margin-bottom: 15px;
    }
    input, select {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: opacity 0.2s;
    }
    button:hover {
      opacity: 0.9;
    }
    .btn-notif {
      width: 100%;
      margin-bottom: 15px;
      padding: 12px;
      background: linear-gradient(135deg, #11998e, #38ef7d);
      font-size: 15px;
    }
    .task {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 5px solid #667eea;
    }
    .task.completed {
      opacity: 0.5;
      text-decoration: line-through;
      border-left-color: #6c757d;
      background: #e9ecef;
    }
    .task input[type="checkbox"] {
      transform: scale(1.3);
      margin-right: 12px;
      cursor: pointer;
    }
    .task-content {
      flex-grow: 1;
      display: flex;
      align-items: center;
    }
    .task-text b {
      color: #2c3e50;
    }
    .task-text small {
      color: #7f8c8d;
      display: block;
      margin-top: 2px;
    }
    @media (max-width: 600px) {
      .input-row, .input-row-schedule {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🚀 MY DAILY TRACKER</h2>

    <div class="card">
      <h3 style="margin-top:0; color:#2c3e50;">💪 Bulking & Workout Routine (<span id="currentDayName">-</span>)</h3>
      <button class="btn-notif" onclick="requestNotificationPermission()">🔔 Aktifkan Pengingat Notifikasi HP/Laptop</button>
      <div id="bulkingList"></div>
    </div>

    <div class="card">
      <h3 style="margin-top:0; color:#2c3e50;">📌 To-Do List / School Task</h3>
      <div class="input-row">
        <input id="taskText" placeholder="Task..." />
        <input type="datetime-local" id="taskTime" />
        <select id="taskReminder">
          <option value="0">No Reminder</option>
          <option value="5">5 menit</option>
          <option value="15" selected>15 menit</option>
          <option value="30">30 menit</option>
        </select>
        <button onclick="addTask()">Add</button>
      </div>
      <div id="taskList"></div>
    </div>

    <div class="card">
      <h3 style="margin-top:0; color:#2c3e50;">📅 Daily Schedule</h3>
      <div class="input-row-schedule">
        <input id="scheduleText" placeholder="Plan..." />
        <input type="datetime-local" id="scheduleTime" />
        <button onclick="addSchedule()">Add Schedule</button>
      </div>
      <div id="scheduleList"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
