<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Login — BIOFLOC MONITORING</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#00c2a8"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="config.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f3f6f8; --card:#ffffff; --border:#d7dfe4; --input-bg:#eef2f5;
  --accent:#00937f; --text:#152029; --text-dim:#5b6b78; --green:#1a9d4c; --red:#d92d2d;
}
body{
  font-family:'Barlow',sans-serif; background:var(--bg); color:var(--text); font-size:18px;
  min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:20px; overflow:hidden; position:relative;
}
/* Water ripple background effect */
body::before{
  content:''; position:fixed; inset:0;
  background:
    radial-gradient(ellipse 70% 45% at 50% -5%, rgba(0,147,127,.10) 0%, transparent 65%),
    radial-gradient(ellipse 50% 35% at 90% 105%, rgba(29,111,217,.06) 0%, transparent 60%);
  pointer-events:none;
}
.wave-decor{position:fixed;bottom:0;left:0;right:0;height:160px;opacity:.12;pointer-events:none;z-index:0;}
.logo-area{text-align:center;margin-bottom:34px;animation:slideDown .5s ease-out;position:relative;z-index:1;}
.logo-icon{font-size:80px;line-height:1;margin-bottom:10px;filter:drop-shadow(0 0 18px rgba(0,147,127,.35));}
.logo-title{font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:900;letter-spacing:2.5px;}
.logo-title span{color:var(--accent);}
.logo-sub{font-size:15px;color:var(--text-dim);letter-spacing:1px;margin-top:9px;line-height:1.7;}

.login-card{
  background:var(--card); border:1px solid var(--border); border-radius:20px;
  padding:30px 26px; width:100%; max-width:420px; animation:slideUp .5s ease-out;
  position:relative; z-index:1; box-shadow:0 4px 24px rgba(20,40,50,.08);
}
.tab-row{display:flex;background:var(--input-bg);border-radius:10px;padding:4px;margin-bottom:26px;}
.tab-btn{flex:1;background:none;border:none;padding:12px;border-radius:8px;color:var(--text-dim);font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;}
.tab-btn.active{background:var(--accent);color:#ffffff;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:14px;font-weight:600;letter-spacing:1px;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;}
.form-input{width:100%;padding:14px 16px;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Barlow',sans-serif;font-size:18px;transition:all .2s;}
.form-input:focus{outline:none;border-color:var(--accent);background:rgba(0,147,127,.04);box-shadow:0 0 0 3px rgba(0,147,127,.12);}
.pw-wrap{position:relative;}
.pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:19px;}
.btn-submit{width:100%;background:var(--accent);color:#ffffff;border:none;padding:16px;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;letter-spacing:1.3px;cursor:pointer;transition:all .2s;margin-top:6px;}
.btn-submit:hover{filter:brightness(1.08);transform:translateY(-1px);}
.btn-submit:disabled{background:#b7c1c9;color:#ffffff;cursor:not-allowed;transform:none;}
.status-msg{margin-top:14px;padding:11px 14px;border-radius:8px;font-size:14px;text-align:center;display:none;}
.status-msg.error{background:rgba(217,45,45,.1);color:var(--red);border:1px solid rgba(217,45,45,.3);display:block;}
.status-msg.success{background:rgba(26,157,76,.1);color:var(--green);border:1px solid rgba(26,157,76,.3);display:block;}
.spinner{width:19px;height:19px;border:2px solid rgba(255,255,255,.4);border-top-color:#ffffff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:8px;}
.register-note{font-size:14px;color:var(--text-dim);text-align:center;margin-top:16px;line-height:1.6;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<svg class="wave-decor" viewBox="0 0 1440 200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M0,100 C240,160 480,40 720,100 C960,160 1200,40 1440,100 L1440,200 L0,200 Z" fill="#00c2a8"/>
</svg>

<div class="logo-area">
  <div class="logo-icon">🐟</div>
  <h1 class="logo-title">BIOFLOC <span>MONITORING</span></h1>
  <p class="logo-sub">REAL-TIME WATER QUALITY MONITORING<br>BIOFLOK NILA &middot; PREDIKSI pH &middot; EARLY WARNING SYSTEM</p>
</div>

<div class="login-card">
  <div class="tab-row">
    <button class="tab-btn active" id="tabLogin" onclick="switchMode('login')">MASUK</button>
    <button class="tab-btn" id="tabRegister" onclick="switchMode('register')">DAFTAR</button>
  </div>

  <div class="form-group">
    <label class="form-label">Username</label>
    <input class="form-input" type="text" id="usernameInput" placeholder="Masukkan username" autocomplete="username" onkeydown="if(event.key==='Enter')focusPw()">
  </div>
  <div class="form-group">
    <label class="form-label">Password</label>
    <div class="pw-wrap">
      <input class="form-input" type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')handleAuth()">
      <button class="pw-toggle" onclick="togglePw('passwordInput','pwToggle1')" id="pwToggle1">👁</button>
    </div>
  </div>
  <div class="form-group" id="confirmGroup" style="display:none;">
    <label class="form-label">Konfirmasi Password</label>
    <div class="pw-wrap">
      <input class="form-input" type="password" id="confirmInput" placeholder="••••••••" autocomplete="new-password" onkeydown="if(event.key==='Enter')handleAuth()">
    </div>
  </div>

  <button class="btn-submit" id="submitBtn" onclick="handleAuth()">MASUK</button>
  <div class="status-msg" id="statusMsg"></div>
  <p class="register-note" id="loginNote">Belum punya akun? Klik tab <b>DAFTAR</b>.</p>
  <p class="register-note" id="registerNote" style="display:none;">Buat akun untuk mengakses dashboard monitoring kolam.</p>
</div>

<script>
const FB_CFG = window.AQUA_CONFIG.FIREBASE_CONFIG;
if (!firebase.apps.length) firebase.initializeApp(FB_CFG);
const auth = firebase.auth();

auth.onAuthStateChanged(user => { if (user) window.location.replace('./index.html'); });

let currentMode = 'login';
function switchMode(mode) {
  currentMode = mode;
  document.getElementById('tabLogin').classList.toggle('active', mode === 'login');
  document.getElementById('tabRegister').classList.toggle('active', mode === 'register');
  document.getElementById('confirmGroup').style.display = mode === 'register' ? 'block' : 'none';
  document.getElementById('submitBtn').textContent = mode === 'login' ? 'MASUK' : 'BUAT AKUN';
  document.getElementById('loginNote').style.display = mode === 'login' ? 'block' : 'none';
  document.getElementById('registerNote').style.display = mode === 'register' ? 'block' : 'none';
  clearStatus();
}
function focusPw() { document.getElementById('passwordInput').focus(); }
function togglePw(id, btnId) {
  const inp = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  document.getElementById(btnId).textContent = show ? '🙈' : '👁';
}
function setStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg; el.className = 'status-msg ' + type;
}
function clearStatus() { document.getElementById('statusMsg').className = 'status-msg'; }
function setLoading(yes) {
  const btn = document.getElementById('submitBtn');
  btn.disabled = yes;
  btn.innerHTML = yes ? '<span class="spinner"></span>Memproses...' : (currentMode==='login' ? 'MASUK' : 'BUAT AKUN');
}
function usernameToEmail(u) { return u.toLowerCase().trim().replace(/\s+/g,'_') + '@aquasentinel.app'; }

function handleAuth() {
  const username = document.getElementById('usernameInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  const confirm  = document.getElementById('confirmInput').value;
  if (!username) return setStatus('⚠️ Username wajib diisi.', 'error');
  if (username.length < 3) return setStatus('⚠️ Username minimal 3 karakter.', 'error');
  if (!password) return setStatus('⚠️ Password wajib diisi.', 'error');
  if (password.length < 6) return setStatus('⚠️ Password minimal 6 karakter.', 'error');
  if (currentMode === 'register') {
    if (!confirm) return setStatus('⚠️ Konfirmasi password wajib diisi.', 'error');
    if (password !== confirm) return setStatus('⚠️ Password tidak cocok.', 'error');
    doRegister(username, password);
  } else { doLogin(username, password); }
}
function doLogin(username, password) {
  setLoading(true); clearStatus();
  auth.signInWithEmailAndPassword(usernameToEmail(username), password)
    .then(() => { setStatus('✅ Berhasil masuk!', 'success'); setTimeout(()=>window.location.replace('./index.html'),700); })
    .catch(err => {
      setLoading(false);
      const msg = err.code==='auth/user-not-found' ? '❌ Username tidak ditemukan. Coba DAFTAR.'
                : err.code==='auth/wrong-password' ? '❌ Password salah.'
                : err.code==='auth/network-request-failed' ? '📵 Tidak ada koneksi internet.'
                : '❌ ' + err.message;
      setStatus(msg, 'error');
    });
}
function doRegister(username, password) {
  setLoading(true); clearStatus();
  auth.createUserWithEmailAndPassword(usernameToEmail(username), password)
    .then(c => c.user.updateProfile({ displayName: username }))
    .then(() => { setStatus('✅ Akun dibuat!', 'success'); setTimeout(()=>window.location.replace('./index.html'),700); })
    .catch(err => {
      setLoading(false);
      const msg = err.code==='auth/email-already-in-use' ? '❌ Username sudah dipakai.'
                : err.code==='auth/network-request-failed' ? '📵 Tidak ada koneksi internet.'
                : '❌ ' + err.message;
      setStatus(msg, 'error');
    });
}
</script>
</body>
</html>
